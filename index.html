<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Médicos vs Anemia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-gradient-to-b from-red-50 to-white font-sans text-slate-800">
  <div id="loader" class="fixed inset-0 bg-red-600 flex flex-col items-center justify-center text-white z-50">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-white"></div>
    <p class="mt-4 text-xl font-bold">Cargando...</p>
  </div>
  <div id="pantalla-idioma" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center fade-in">
    <h2 class="text-3xl font-bold mb-6 text-red-700">Elige tu idioma</h2>
    <div class="space-y-4 w-full max-w-sm">
      <button onclick="guardarConfig('idioma', 'es')" class="w-full bg-red-600 text-white p-4 rounded-xl">Español</button>
      <button onclick="guardarConfig('idioma', 'qu')" class="w-full bg-green-600 text-white p-4 rounded-xl">Quechua</button>
    </div>
  </div>
  <div id="pantalla-dificultad" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center fade-in"></div>
  <div id="menu-niveles" class="hidden min-h-screen flex flex-col items-center justify-center p-6 fade-in">
    <div id="grid-niveles" class="grid grid-cols-2 gap-4 w-full max-w-3xl"></div>
  </div>
  <div id="vista-nivel" class="hidden p-6 max-w-3xl mx-auto bg-white rounded-xl shadow-lg mt-6 fade-in">
    <h2 id="titulo-nivel" class="text-3xl font-bold text-red-600"></h2>
    <div id="info-1" class="mb-4 p-4 bg-red-50 rounded-lg"></div>
    <div id="info-2" class="mb-4 p-4 bg-slate-100 rounded-lg"></div>
    <div id="contenedor-juego" class="p-6 border-4 border-red-500 rounded-xl text-center"></div>
    <button onclick="volverMenu()" class="mt-6 w-full bg-slate-800 text-white py-3 rounded">Volver al Menú</button>
  </div>
  <script src="datos.js"></script>
  <script src="juegos.js"></script>
  <script src="app.js"></script>
</body>
</html>
